syntax = "proto3";

package com.wayrenprototype.c2;

// ── Reusable types ──

message Coordinate {
  double lat = 1;
  double lng = 2;
  optional double alt = 3;
}

message TimedPoint {
  Coordinate coord = 1;
  uint32 relative_time_ms = 2; // milliseconds since the first point was drawn
}

// ── Top-level wrapper ──

message C2Payload {
  oneof payload {
    C2Chat          chat           = 1;
    C2GISObject     gis_object     = 2;
    C2TacticalDraw  tactical_draw  = 3;
    C2Image         image          = 4;
    C2Audio         audio          = 5;
    C2SyncMapBoundary sync_map_boundary = 6;
  }
}

// ── 1. Chat ──

message C2Chat {
  string from_callsign = 1;
  repeated string to_callsigns = 2;
  string text = 3;
  optional string reply_to_message_id = 4;
  string uuid = 5;
}

// ── 2. GIS Object ──

enum ObjectAction {
  OBJECT_ADD = 0;
  OBJECT_UPDATE = 1;
  OBJECT_DELETE = 2;
}

enum ObjectAffiliation {
  AFFILIATION_FRIENDLY = 0;
  AFFILIATION_HOSTILE  = 1;
  AFFILIATION_NEUTRAL  = 2;
  AFFILIATION_UNKNOWN  = 3;
}

enum ShapeType {
  SHAPE_ICON     = 0;  // single point marker
  SHAPE_POLYGON  = 1;  // closed area boundary
  SHAPE_VECTOR   = 2;  // open path / route
}

message C2GISObject {
  ObjectAction action = 1;
  string object_id = 2;
  string name = 3;
  repeated string tags = 4;
  ObjectAffiliation affiliation = 5;
  repeated Coordinate points = 6;  // 1 point for ICON, boundary for POLYGON, waypoints for VECTOR
  optional double course = 7;
  optional double speed = 8;
  optional string icon = 9;
  optional string parent_object_id = 10;
  ShapeType shape = 11;
}

// ── 3. Tactical Drawing (freehand annotation with playback timing) ──

message C2TacticalDraw {
  string draw_id = 1;
  string name = 2;
  uint32 stroke_width = 3;
  string stroke_color = 4;       // hex color e.g. "#FF0000"
  repeated TimedPoint points = 5; // drawn path with relative timestamps
}

// ── 4. Image ──

message C2Image {
  string image_id = 1;
  bytes data = 2;
  string mime_type = 3;
  optional string caption = 4;
  optional Coordinate geotag = 5;
  string from_callsign = 6;
  string uuid = 7;
}

// ── 5. Audio ──

message C2Audio {
  string audio_id = 1;
  bytes data = 2;
  string mime_type = 3;
  string from_callsign = 4;
  string uuid = 5;
  uint32 duration_sec = 6;
}

// ── 6. Sync Map Boundary (share map center and zoom) ──

message C2SyncMapBoundary {
  double center_lat = 1;
  double center_lng = 2;
  double zoom = 3;
}
